name: spark-image-ci

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - src/workflows/ELT/**
      - .github/workflows/spark.yaml
      - .gitleaks.toml
  pull_request:
    paths:
      - src/workflows/ELT/**
      - .github/workflows/spark.yaml
      - .gitleaks.toml

permissions:
  contents: read

concurrency:
  group: spark-image-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  IMAGE_NAME: flyte-elt-spark-base
  IMAGE_TAG: ${{ github.sha }}
  BUILD_CONTEXT: src/workflows/ELT
  DOCKERFILE_PATH: src/workflows/ELT/Dockerfile.spark

  REGISTRY_TYPE: ${{ vars.REGISTRY_TYPE || 'ghcr' }}
  PLATFORMS: ${{ vars.PLATFORMS || 'linux/amd64,linux/arm64' }}
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}

  GHCR_IMAGE_REPO: ${{ vars.GHCR_IMAGE_REPO || '' }}
  GHCR_USERNAME: ${{ vars.GHCR_USERNAME || github.actor }}
  ECR_IMAGE_REPO: ${{ vars.ECR_IMAGE_REPO || '' }}

  TRIVY_IMAGE: aquasec/trivy@sha256:3d1f862cb6c4fe13c1506f96f816096030d8d5ccdb2380a3069f7bf07daa86aa
  TRIVY_SCANNERS: vuln,secret,misconfig,license
  TRIVY_SEVERITY: HIGH,CRITICAL
  TRIVY_IGNORE_UNFIXED: "true"
  TRIVY_TIMEOUT: 10m

  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_CONFIG: .gitleaks.toml

  PUSH_IMAGE: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && 'true' || 'false' }}

jobs:
  scan:
    name: spark-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Run Spark CI
        run: bash src/workflows/ELT/spark_CI.sh

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spark-scan-artifacts
          path: |
            .spark-ci-artifacts/*.sarif
          if-no-files-found: ignore

  publish-ghcr:
    name: spark-publish-ghcr
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: scan
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && vars.REGISTRY_TYPE == 'ghcr'
    permissions:
      contents: read
      packages: write
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Validate GHCR inputs
        run: |
          set -euo pipefail
          test -n "${GHCR_IMAGE_REPO}"

      - name: Run Spark CI and push to GHCR
        env:
          GIT_PAT: ${{ secrets.GIT_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash src/workflows/ELT/spark_CI.sh

  publish-ecr:
    name: spark-publish-ecr
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: scan
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && vars.REGISTRY_TYPE == 'ecr'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate ECR inputs
        run: |
          set -euo pipefail
          test -n "${ECR_IMAGE_REPO}"
          test -n "${AWS_REGION}"

      - name: Run Spark CI and push to ECR
        run: bash src/workflows/ELT/spark_CI.sh