apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlflow
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/component: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow
        app.kubernetes.io/component: server
      annotations:
        mlflow.io/config-checksum: 7da664cc9577d2996850a8a00e06d324d5131c818dc0d38e057a2c4db11abdbd
    spec:
      serviceAccountName: mlflow
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mlflow
        image: ghcr.io/athithya-sakthivel/mlflow:2026-04-03-08-10--22db809@sha256:5a8ae55baa1aaed0411e90c4c3bd5c9564b47e5cc8f315e16804cdbf2835f7d2
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -lc
        args:
        - "set -eu\necho \"[mlflow][server] starting\" >&2\necho \"[mlflow][server] python3=$(python3 --version 2>&1)\" >&2\n\
          echo \"[mlflow][server] mlflow=$(mlflow --version 2>&1)\" >&2\necho \"[mlflow][server] backend=${DB_HOST}:${DB_PORT}/${DB_NAME}\"\
          \ >&2\necho \"[mlflow][server] artifacts=${MLFLOW_ARTIFACTS_DESTINATION}\" >&2\necho \"[mlflow][server] workers=${MLFLOW_WORKERS}\"\
          \ >&2\necho \"[mlflow][server] disable_security_middleware=${MLFLOW_SERVER_DISABLE_SECURITY_MIDDLEWARE}\" >&2\n\
          echo \"[mlflow][server] secrets_cache_ttl=${MLFLOW_SECRETS_CACHE_TTL}\" >&2\necho \"[mlflow][server] secrets_cache_max_size=${MLFLOW_SECRETS_CACHE_MAX_SIZE}\"\
          \ >&2\nBACKEND_URI=\"$(python3 - <<'PY'\nimport os\nfrom urllib.parse import quote\n\nuser = quote(os.environ[\"\
          DB_USER\"], safe=\"\")\npassword = quote(os.environ[\"DB_PASSWORD\"], safe=\"\")\nprint(\n    \"postgresql://%s:%s@%s:%s/%s\"\
          \n    % (\n        user,\n        password,\n        os.environ[\"DB_HOST\"],\n        os.environ[\"DB_PORT\"],\n\
          \        os.environ[\"DB_NAME\"],\n    )\n)\nPY\n)\"\necho \"[mlflow][server] backend_uri=postgresql://${DB_USER}:*****@${DB_HOST}:${DB_PORT}/${DB_NAME}\"\
          \ >&2\nexec mlflow server \\\n  --host 0.0.0.0 \\\n  --port \"${MLFLOW_PORT}\" \\\n  --disable-security-middleware\
          \ \\\n  --backend-store-uri \"${BACKEND_URI}\" \\\n  --registry-store-uri \"${BACKEND_URI}\" \\\n  --artifacts-destination\
          \ \"${MLFLOW_ARTIFACTS_DESTINATION}\" \\\n  --serve-artifacts \\\n  --workers \"${MLFLOW_WORKERS}\" \\\n  --secrets-cache-ttl\
          \ \"${MLFLOW_SECRETS_CACHE_TTL}\" \\\n  --secrets-cache-max-size \"${MLFLOW_SECRETS_CACHE_MAX_SIZE}\"\n"
        env:
        - name: DB_HOST
          value: postgres-pooler.default.svc.cluster.local
        - name: DB_PORT
          value: '5432'
        - name: DB_NAME
          value: mlflow
        - name: DB_USER
          value: app
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mlflow-db-auth
              key: password
        - name: MLFLOW_PORT
          value: '5000'
        - name: MLFLOW_WORKERS
          value: '1'
        - name: MLFLOW_SECRETS_CACHE_TTL
          value: '30'
        - name: MLFLOW_SECRETS_CACHE_MAX_SIZE
          value: '128'
        - name: MLFLOW_ARTIFACTS_DESTINATION
          value: s3://e2e-mlops-data-681802563986
        - name: MLFLOW_SERVER_DISABLE_SECURITY_MIDDLEWARE
          value: 'true'
        - name: AWS_REGION
          value: ap-south-1
        - name: AWS_DEFAULT_REGION
          value: ap-south-1
        - name: HOME
          value: /tmp
        - name: TMPDIR
          value: /tmp
        - name: XDG_CACHE_HOME
          value: /tmp/.cache
        - name: MLFLOW_S3_BUCKET
          value: e2e-mlops-data-681802563986
        - name: MLFLOW_S3_PREFIX
          value: ''
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-auth
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-auth
              key: AWS_SECRET_ACCESS_KEY
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 800m
            memory: 1Gi
        startupProbe:
          tcpSocket:
            port: http
          timeoutSeconds: 1
          periodSeconds: 5
          failureThreshold: 120
        readinessProbe:
          httpGet:
            path: /
            port: http
            scheme: HTTP
          timeoutSeconds: 10
          periodSeconds: 5
          failureThreshold: 12
          successThreshold: 1
        livenessProbe:
          tcpSocket:
            port: http
          timeoutSeconds: 1
          periodSeconds: 20
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          runAsGroup: 10001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      terminationGracePeriodSeconds: 30
      volumes:
      - name: tmp
        emptyDir: {}
