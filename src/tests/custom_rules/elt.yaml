# security.yaml
# Final security rules for the ELT pipeline.
#
# Scope:
#   Keep only high-confidence security guardrails.
#   Everything that previously matched intentional internal behavior or pure
#   performance concerns has been removed.

rules:
  # Guardrail: env-driven outbound URL use.
  #
  # Why this stays:
  #   - This code probes an HTTP Iceberg REST endpoint.
  #   - If the endpoint ever becomes attacker-controlled, this becomes an SSRF-style
  #     outbound request risk.
  #   - This is a conservative warning, not a confirmed vulnerability in the current
  #     repository state.
  #
  # Why the rest of the earlier security rules were removed:
  #   - The SQL interpolation matches internal catalog/namespace constants.
  #   - The "secret logging" rule was matching ordinary row preview logging, not secrets.
  #   - The overwrite and coalesce rules are data/maintenance choices, not security bugs.
  - id: elt.security.env-controlled-url-open
    message: >
      A network request is being made with an environment-controlled URL. Validate and
      whitelist the endpoint before using it in urllib request objects or urlopen calls.
    severity: WARNING
    mode: taint
    languages: [python]
    metadata:
      category: security
      technology:
        - python
      confidence: medium
      impact: medium
      cwe: "CWE-918"
      tags:
        - ssrf
        - url
        - urllib
        - configuration
    paths:
      include:
        - "src/workflows/ELT/**/*.py"
    pattern-sources:
      - pattern: os.environ.get("ICEBERG_REST_URI", ...)
      - pattern: os.getenv("ICEBERG_REST_URI", ...)
    pattern-sinks:
      - pattern: urllib.request.Request(...)
      - pattern: urllib.request.urlopen(...)